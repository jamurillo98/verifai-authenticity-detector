<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign in — VerifAi</title>
    <meta name="description" content="Sign in to your VerifAi account." />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="page-app page-auth">
    <header class="navbar">
      <a class="navbar-brand" href="index.html">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-text"><span class="brand-verif">Verif</span><span class="brand-ai">Ai</span></span>
      </a>
      <nav class="navbar-nav" aria-label="Primary">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#how-it-works" class="nav-link">How it works</a>
        <a href="history.html" class="nav-link">History</a>
        <a href="index.html#about" class="nav-link">About</a>
      </nav>
      <div class="navbar-actions">
        <a href="login.html" class="btn btn-ghost">Sign in</a>
        <a href="upload.html" class="btn btn-primary">Get Started</a>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <div class="auth-card-brand">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="brand-text"><span class="brand-verif">Verif</span><span class="brand-ai">Ai</span></span>
        </div>
        <h1 class="auth-title">Sign in</h1>

        <p class="auth-success" id="login-success" role="status" hidden>Account created. You can sign in now.</p>

        <form class="auth-form" id="login-form" action="#" method="post">
          <div class="auth-field">
            <label for="email">Email</label>
            <input
              type="email"
              id="email"
              name="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
          </div>
          <div class="auth-field">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              name="password"
              autocomplete="current-password"
              placeholder="Enter your password"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="login-submit">Login</button>
        </form>

        <p class="auth-form-error" id="login-error" role="alert" hidden></p>

        <p class="auth-footer">
          Don&rsquo;t have an account?
          <a href="register.html">Register</a>
        </p>
      </div>
    </main>

    <footer class="footer">
      <a class="footer-brand" href="index.html">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-text"><span class="brand-verif">Verif</span><span class="brand-ai">Ai</span></span>
      </a>
      <nav class="footer-nav" aria-label="Footer">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="history.html">History</a>
        <a href="register.html">Register</a>
      </nav>
      <p class="footer-copy">&copy; 2026 VerifAi. All rights reserved.</p>
    </footer>

    <script>
      (function () {
        var API_LOGIN = "https://vrifai-backend.onrender.com/api/auth/login";
        var HISTORY_HREF = "history.html";

        var form = document.getElementById("login-form");
        var errEl = document.getElementById("login-error");
        var successEl = document.getElementById("login-success");
        var submitBtn = document.getElementById("login-submit");

        try {
          var params = new URLSearchParams(window.location.search);
          if (params.get("registered") === "1" && successEl) {
            successEl.hidden = false;
          }
        } catch (e) {}

        function showError(message) {
          if (!errEl) return;
          if (!message) {
            errEl.textContent = "";
            errEl.hidden = true;
            return;
          }
          errEl.textContent = message;
          errEl.hidden = false;
        }

        function extractToken(payload) {
          if (!payload || typeof payload !== "object") return null;
          if (typeof payload.token === "string" && payload.token) return payload.token;
          if (payload.data && typeof payload.data.token === "string" && payload.data.token) {
            return payload.data.token;
          }
          return null;
        }

        if (!form) return;

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          showError("");

          var emailEl = document.getElementById("email");
          var passwordEl = document.getElementById("password");
          var email = emailEl ? emailEl.value.trim() : "";
          var password = passwordEl ? passwordEl.value : "";

          if (submitBtn) submitBtn.disabled = true;

          fetch(API_LOGIN, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({ email: email, password: password }),
          })
            .then(function (res) {
              return res.json().then(
                function (body) {
                  return { ok: res.ok, body: body };
                },
                function () {
                  return { ok: res.ok, body: null };
                }
              );
            })
            .then(function (result) {
              if (!result.ok) {
                var msg =
                  result.body && typeof result.body.message === "string"
                    ? result.body.message
                    : "Login failed. Please try again.";
                showError(msg);
                return;
              }
              var token = extractToken(result.body);
              if (!token) {
                showError("Login succeeded but no token was returned.");
                return;
              }
              try {
                localStorage.setItem("verifai_token", token);
              } catch (storeErr) {
                showError("Could not save your session in this browser.");
                return;
              }
              window.location.href = HISTORY_HREF;
            })
            .catch(function () {
              showError("Network error. Check that the server is running and try again.");
            })
            .finally(function () {
              if (submitBtn) submitBtn.disabled = false;
            });
        });
      })();
    </script>
  </body>
</html>
