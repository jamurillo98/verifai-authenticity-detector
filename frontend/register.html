<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register — VerifAi</title>
    <meta name="description" content="Create a VerifAi account." />
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="login.css" />
  </head>
  <body class="page-app page-auth">
    <header class="navbar">
      <a class="navbar-brand" href="index.html">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-text"><span class="brand-verif">Verif</span><span class="brand-ai">Ai</span></span>
      </a>
      <nav class="navbar-nav" aria-label="Primary">
        <a href="index.html" class="nav-link">Home</a>
        <a href="index.html#how-it-works" class="nav-link">How it works</a>
        <a href="history.html" class="nav-link">History</a>
        <a href="index.html#about" class="nav-link">About</a>
      </nav>
      <div class="navbar-actions">
        <a href="login.html" class="btn btn-ghost">Sign in</a>
        <a href="upload.html" class="btn btn-primary">Get Started</a>
      </div>
    </header>

    <main class="auth-main">
      <div class="auth-card">
        <div class="auth-card-brand">
          <span class="brand-dot" aria-hidden="true"></span>
          <span class="brand-text"><span class="brand-verif">Verif</span><span class="brand-ai">Ai</span></span>
        </div>
        <h1 class="auth-title">Create account</h1>

        <form class="auth-form" id="register-form" action="#" method="post">
          <div class="auth-field">
            <label for="reg-name">Name</label>
            <input
              type="text"
              id="reg-name"
              name="name"
              autocomplete="name"
              placeholder="Your name"
              required
            />
          </div>
          <div class="auth-field">
            <label for="reg-email">Email</label>
            <input
              type="email"
              id="reg-email"
              name="email"
              autocomplete="email"
              placeholder="you@example.com"
              required
            />
          </div>
          <div class="auth-field">
            <label for="reg-password">Password</label>
            <input
              type="password"
              id="reg-password"
              name="password"
              autocomplete="new-password"
              placeholder="Choose a password"
              minlength="8"
              required
            />
          </div>
          <div class="auth-field">
            <label for="reg-password-confirm">Confirm password</label>
            <input
              type="password"
              id="reg-password-confirm"
              name="password_confirm"
              autocomplete="new-password"
              placeholder="Re-enter your password"
              minlength="8"
              required
            />
          </div>
          <button type="submit" class="btn btn-primary btn-full" id="register-submit">Register</button>
        </form>

        <p class="auth-form-error" id="register-error" role="alert" hidden></p>

        <p class="auth-footer">
          Already have an account?
          <a href="login.html">Sign in</a>
        </p>
      </div>
    </main>

    <footer class="footer">
      <a class="footer-brand" href="index.html">
        <span class="brand-dot" aria-hidden="true"></span>
        <span class="brand-text"><span class="brand-verif">Verif</span><span class="brand-ai">Ai</span></span>
      </a>
      <nav class="footer-nav" aria-label="Footer">
        <a href="index.html">Home</a>
        <a href="upload.html">Upload</a>
        <a href="history.html">History</a>
        <a href="register.html">Register</a>
      </nav>
      <p class="footer-copy">&copy; 2026 VerifAi. All rights reserved.</p>
    </footer>

    <script>
      (function () {
        var API_REGISTER = "https://vrifai-backend.onrender.com/api/auth/register";
        var LOGIN_HREF = "login.html?registered=1";

        var form = document.getElementById("register-form");
        var errEl = document.getElementById("register-error");
        var submitBtn = document.getElementById("register-submit");

        function showError(message) {
          if (!errEl) return;
          if (!message) {
            errEl.textContent = "";
            errEl.hidden = true;
            return;
          }
          errEl.textContent = message;
          errEl.hidden = false;
        }

        if (!form) return;

        form.addEventListener("submit", function (e) {
          e.preventDefault();
          showError("");

          var nameEl = document.getElementById("reg-name");
          var emailEl = document.getElementById("reg-email");
          var passwordEl = document.getElementById("reg-password");
          var confirmEl = document.getElementById("reg-password-confirm");
          var name = nameEl ? nameEl.value.trim() : "";
          var email = emailEl ? emailEl.value.trim() : "";
          var password = passwordEl ? passwordEl.value : "";
          var confirm = confirmEl ? confirmEl.value : "";

          if (password !== confirm) {
            showError("Passwords do not match.");
            return;
          }

          if (submitBtn) submitBtn.disabled = true;

          fetch(API_REGISTER, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Accept: "application/json",
            },
            body: JSON.stringify({ name: name, email: email, password: password }),
          })
            .then(function (res) {
              return res.json().then(
                function (body) {
                  return { ok: res.ok, body: body };
                },
                function () {
                  return { ok: res.ok, body: null };
                }
              );
            })
            .then(function (result) {
              if (!result.ok) {
                var msg =
                  result.body && typeof result.body.message === "string"
                    ? result.body.message
                    : "Registration failed. Please try again.";
                showError(msg);
                return;
              }
              window.location.href = LOGIN_HREF;
            })
            .catch(function () {
              showError("Network error. Check that the server is running and try again.");
            })
            .finally(function () {
              if (submitBtn) submitBtn.disabled = false;
            });
        });
      })();
    </script>
  </body>
</html>
